name: Versioning Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Apply versions from changesets
        run: pnpm version:packages

      - name: Sync Android Gradle version
        run: pnpm version:android:sync

      - name: Commit version files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(release): apply semantic version bumps"
            git push
          else
            echo "No version changes to commit"
          fi

      - name: Create app tags
        run: pnpm release:tag

      - name: Push tags
        run: git push --tags

      - name: Create GitHub releases for Web/API/Android
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const { execSync } = require('node:child_process')

            const readVersion = (file) => JSON.parse(fs.readFileSync(file, 'utf8')).version

            const APP_PATHS = {
              web: 'apps/web',
              api: 'apps/api',
              android: 'apps/mobile-android',
            }

            const run = (command) =>
              execSync(command, { encoding: 'utf8' }).trim()

            const getPreviousTag = (app, currentTag) => {
              const tags = run(`git tag --list '${app}-v*' --sort=-v:refname`)
                .split('\n')
                .map((tag) => tag.trim())
                .filter(Boolean)

              return tags.find((tag) => tag !== currentTag) || null
            }

            const getKeyChanges = (app, previousTag, currentTag) => {
              const appPath = APP_PATHS[app]
              const range = previousTag ? `${previousTag}..${currentTag}` : currentTag
              const command = previousTag
                ? `git log --pretty=format:%s ${range} -- '${appPath}'`
                : `git log --pretty=format:%s -n 20 ${range} -- '${appPath}'`

              const rawMessages = run(command)
              if (!rawMessages) return []

              return [...new Set(
                rawMessages
                  .split('\n')
                  .map((message) => message.trim())
                  .filter((message) => message && !message.startsWith('chore(release): apply semantic version bumps'))
              )].slice(0, 8)
            }

            const buildReleaseBody = ({ app, version, tag, previousTag, keyChanges }) => {
              const appLabel = app.toUpperCase()
              const previousTagLabel = previousTag ? `\`${previousTag}\`` : 'Initial release for this app tag stream'
              const keyChangesSection = keyChanges.length
                ? keyChanges.map((change) => `- ${change}`).join('\n')
                : '- No app-scoped commit messages found in this version window.'

              return [
                `## What's Included`,
                `- App: ${appLabel}`,
                `- Version: \`${version}\``,
                `- Tag: \`${tag}\``,
                `- Based on: ${previousTagLabel}`,
                '',
                '## Key Changes',
                keyChangesSection,
                '',
                '## Impact & Notes',
                '- Generated automatically from git history (deterministic, no AI summarization).',
                '- Release flow, versioning, and tag strategy remain unchanged.',
                '- If key changes are empty, review merged commits for non app-scoped updates.',
              ].join('\n')
            }

            const releases = [
              { app: 'web', version: readVersion('apps/web/package.json'), makeLatest: 'false' },
              { app: 'api', version: readVersion('apps/api/package.json'), makeLatest: 'false' },
              { app: 'android', version: readVersion('apps/mobile-android/package.json'), makeLatest: 'true' },
            ]

            for (const { app, version, makeLatest } of releases) {
              const tag = `${app}-v${version}`
              const previousTag = getPreviousTag(app, tag)
              const keyChanges = getKeyChanges(app, previousTag, tag)
              const body = buildReleaseBody({ app, version, tag, previousTag, keyChanges })

              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                })
                core.info(`Release already exists for ${tag}`)
                continue
              } catch (error) {
                if (error.status !== 404) throw error
              }

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${app.toUpperCase()} Release v${version}`,
                body,
                make_latest: makeLatest,
              })

              core.info(`Created release for ${tag}`)
            }

      - name: Android release reminder
        run: |
          VERSION=$(node -e "console.log(require('./apps/mobile-android/package.json').version)")
          echo "📱 Android $VERSION versioned. Reminder: build/sign/upload APK/AAB manually."
