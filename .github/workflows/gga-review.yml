name: GGA Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/**"
      - "AGENTS.md"
      - ".gga"
      - ".github/workflows/gga-review.yml"

jobs:
  gga:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        uses: cli/cli-action@v2

      - name: Install GGA
        run: |
          git clone https://github.com/Gentleman-Programming/gentleman-guardian-angel.git /tmp/gga
          chmod +x /tmp/gga/bin/gga
          echo "/tmp/gga/bin" >> "$GITHUB_PATH"

      - name: Run GGA on PR changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVIDER: github:gpt-4o
        run: gga run --pr-mode
